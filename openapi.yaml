info:
  title: FastAPI
  version: 0.1.0
openapi: 3.0.2
paths:
  /files/{file_id}/uploads:
    get:
      description: 'Get all multi-part uploads (can only be 1 or none) which are currently
        pending.

        E.g. this endpoint is useful if the client has lost the ID of the currently
        ongoing

        upload.'
      operationId: getPendingUploads
      parameters:
      - in: path
        name: file_id
        required: true
        schema:
          title: File Id
          type: string
      - description: The status of the multi-part upload, only 'pending' is allowed
          as the single option.
        in: query
        name: status
        required: false
        schema:
          default: pending
          description: The status of the multi-part upload, only 'pending' is allowed
            as the single option.
          enum:
          - pending
          title: Status
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/UploadDetails'
                title: Response Get Pending Uploads Files  File Id  Uploads Get
                type: array
          description: List of pending multi-part uploads and their details. Please
            note, the list may either contain 1 or 0 elements.
        '403':
          description: The user is not registered as a Data Submitter for the corresponding
            file.
        '404':
          description: The file with the given ID has not (yet) been registered for
            upload.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get all pending uploads for a given file.
    post:
      description: Initiate a new mutli-part upload for the given file.
      operationId: createUpload
      parameters:
      - in: path
        name: file_id
        required: true
        schema:
          title: File Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadDetails'
          description: Details on the newly created upload.
        '403':
          description: '

            Either the user is not registered as a Data Submitter for the corresponding
            file.

            Or it is currently not possible to create a new upload for the file with
            the specified

            ID because:

            - a previous upload for that file was already accepted

            - another upload for that file is currently in progress or is waiting
            for acceptance

            '
        '404':
          description: The file with the given ID has not (yet) been registered for
            upload.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Initiate a new mutli-part upload.
  /health:
    get:
      description: Used to test if this service is alive
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: health
  /uploads/{upload_id}:
    patch:
      description: 'Declare a multi-part upload as complete by setting its status
        to "uploaded".

        Or cancel a multi-part upload by setting its status to "cancelled".'
      operationId: updateUploadStatus
      parameters:
      - in: path
        name: upload_id
        required: true
        schema:
          title: Upload Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUpdate'
        required: true
      responses:
        '204':
          description: Multi-part upload successfully updated.
        '403':
          description: The user is not registered as a Data Submitter for the file
            corresponding to this multi-part upload.
        '404':
          description: The multi-part upload with the given ID does not exist.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update the status of an existing multi-part upload.
  /uploads/{upload_id}/parts/{part_no}/signed_posts:
    post:
      description: 'Create a pre-signed post for the specified part number of the
        specified multi-part

        upload.'
      operationId: createPreSignedPost
      parameters:
      - in: path
        name: upload_id
        required: true
        schema:
          title: Upload Id
          type: string
      - in: path
        name: part_no
        required: true
        schema:
          maximum: 10000.0
          minimum: 1.0
          title: Part No
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                description: To be defined in further detail.
                type: object
          description: The newly create pre-signed POST.
        '403':
          description: The user is not registered as a Data Submitter for the file
            corresponding to this multi-part upload.
        '404':
          description: The multi-part upload with the given ID does not exist.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update the status of an existing multi-part upload.
